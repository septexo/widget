<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent !important;
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .widget {
    display: inline-flex;
    flex-direction: column;
    gap: 4px;
    background: rgba(0,0,0,0.65);
    border-radius: 10px;
    padding: 8px 14px 8px 10px;
    border: 1px solid rgba(255,255,255,0.08);
    margin: 10px;
  }
  .row { display: flex; align-items: center; gap: 7px; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #ff3b3b; box-shadow: 0 0 5px #ff3b3b; flex-shrink: 0;
  }
  .city { color: #fff; font-size: 14px; font-weight: 600; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
  .sep { width: 1px; height: 13px; background: rgba(255,255,255,0.2); }
  .wicon { font-size: 16px; }
  .temp { color: #fff; font-size: 14px; font-weight: 700; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
  .clock-ic { font-size: 13px; color: #aaa; }
  .time { color: #fff; font-size: 15px; font-weight: 700; letter-spacing: 1px; font-variant-numeric: tabular-nums; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
  .cal-ic { font-size: 13px; color: #4fc3f7; }
  .date { color: #ddd; font-size: 13px; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
</style>
</head>
<body>
<div class="widget">
  <div class="row">
    <div class="dot"></div>
    <span class="city" id="city">Yükleniyor…</span>
    <div class="sep"></div>
    <span class="wicon" id="wicon">–</span>
    <span class="temp" id="temp">–°C</span>
  </div>
  <div class="row">
    <span class="clock-ic">🕐</span>
    <span class="time" id="clock">--:--</span>
    <div class="sep"></div>
    <span class="cal-ic">📅</span>
    <span class="date" id="date">--.--.----</span>
  </div>
</div>
<script>
function pad(n){ return String(n).padStart(2,'0'); }
 
function updateClock(){
  const now = new Date();
  document.getElementById('clock').textContent = pad(now.getHours())+':'+pad(now.getMinutes());
  document.getElementById('date').textContent = pad(now.getDate())+'.'+pad(now.getMonth()+1)+'.'+now.getFullYear();
}
 
function wIcon(c){
  if(c<=0) return '\u2600\ufe0f';
  if(c<=1) return '\ud83c\udf24\ufe0f';
  if(c<=3) return '\u26c5';
  if(c<=48) return '\ud83c\udf2b\ufe0f';
  if(c<=67) return '\ud83c\udf27\ufe0f';
  if(c<=77) return '\u2744\ufe0f';
  if(c<=82) return '\ud83c\udf26\ufe0f';
  return '\u26c8\ufe0f';
}
 
async function reverseGeocode(lat, lon){
  try {
    const r = await fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json&accept-language=tr&zoom=14');
    const d = await r.json();
    const a = d.address;
    const ilce = a.neighbourhood || a.suburb || a.quarter || a.town || a.district || a.municipality || '';
    const sehir = a.city || a.province || a.state || '';
    if(ilce && sehir && ilce !== sehir) return ilce + ', ' + sehir;
    if(sehir) return sehir;
    return ilce || d.display_name.split(',')[0];
  } catch(e){ return lat.toFixed(1)+', '+lon.toFixed(1); }
}
 
async function fetchWeather(lat, lon){
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,weather_code&timezone=auto');
    const d = await r.json();
    const c = d.current;
    document.getElementById('temp').textContent = Math.round(c.temperature_2m)+'°C';
    document.getElementById('wicon').textContent = wIcon(c.weather_code);
  } catch(e){}
}
 
async function init(){
  updateClock();
  setInterval(updateClock, 1000);
  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;
    const cityName = await reverseGeocode(lat, lon);
    document.getElementById('city').textContent = cityName;
    await fetchWeather(lat, lon);
    setInterval(function(){ fetchWeather(lat, lon); }, 10*60*1000);
  }, function(){
    document.getElementById('city').textContent = 'Konum alinamadi';
    fetchWeather(38.4192, 27.1287);
  }, {timeout: 10000});
}
 
init();
</script>
</body>
</html>
